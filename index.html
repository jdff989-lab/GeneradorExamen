<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Exámenes IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Generador de Exámenes IA</h1>
      <p class="subtitle">Convierte apuntes en preguntas tipo test automáticamente.</p>

      <label for="texto">Pega aquí tus apuntes</label>
      <textarea id="texto" placeholder="Pega aquí el contenido del tema..."></textarea>

      <div class="form-grid">
        <div>
          <label for="numeroPreguntas">Número de preguntas</label>
          <input type="number" id="numeroPreguntas" min="1" max="20" value="5" />
        </div>

        <div>
          <label for="dificultad">Dificultad</label>
          <select id="dificultad">
            <option value="fácil">Fácil</option>
            <option value="media">Media</option>
            <option value="difícil">Difícil</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button id="generarBtn">Generar examen</button>
        <button id="limpiarBtn" class="secondary">Limpiar</button>
      </div>

      <div id="estado"></div>
      <section id="resultado" class="resultado"></section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
